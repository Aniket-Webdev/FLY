<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homepage</title>
  <style>
    body{
      padding:30px;
      background:linear-gradient(to right, #e2e2e2, #c9d6ff);
    }
    h1{
      text-align:center;
      font-family:Arial, Helvetica, sans-serif;
    }
    button{
      color: #fff;
      background-color: #2888E8FF;
      padding:5px;
      border-radius:5px;
      font-size:1rem;
      font-weight:bold;
      border:none;
      cursor: pointer;
    }
    button:hover{
      text-decoration: underline;
      color:black;
    }
    button, div{
      margin-left:15%;
      font-size:20px;
      padding:10px;
    }
    div{
      font-size: 2rem;
      font-weight:400;
      color:rgb(12,11,11);
      margin-bottom: 2rem;
    }
    span{
      font-weight:600;
      font-size:25px;
      color:rgb(228, 14, 14);
    }
    .typing-text {
    font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
    font-weight: 400;
    color: rgb(12, 11, 11);
    margin-bottom: 2rem;
    overflow: hidden;
    white-space: nowrap;
    font-size: 2rem;
    }
    .typing-text span {
      animation: typing 4s steps(40, end);
    }
    @keyframes typing {
      from {
        width: 0;
      }
      to {
        width: 100%;
      }
    }
    @media screen and (max-width: 500px) {
      h1 {
        font-size: 18px;
        text-align: center;
        font-family: Arial, Helvetica, sans-serif;
      }
      button {
        font-size: 14px;
        margin-left: 0%;
      }
      .typing-text{
        white-space: normal;
      }
    }
  </style>
  <script type="module" src="./JS/homepage.js"></script>
</head>
<body>
  <h1 class="title">Welcome to the Homepage</h1>
  <div class="typing-text">
    <span id="text">Our page is currently undergoing maintenance, and we will return with a significant update.</span>
  </div>
  <button id="logout">Logout</button>
  <script>
    const textElement = document.getElementById('text');
    const text = textElement.textContent;
    const typingSpeed = 50; // adjust the speed to your liking

    let i = 0;
    const typingInterval = setInterval(() => {
      if (i < text.length) {
        textElement.textContent = text.substring(0, i + 1);
        i++;
      } else {
        clearInterval(typingInterval);
      }
    }, typingSpeed);
  </script>
</body>
</html>
